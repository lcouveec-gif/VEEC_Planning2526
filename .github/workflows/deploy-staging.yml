name: Deploy Staging (recette)

on:
  push:
    branches:
      - recette

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/lcouveec-gif/veec-frontend
  BACKEND_IMAGE: ghcr.io/lcouveec-gif/veec-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:staging
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL_STAGING }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY_STAGING }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY_STAGING }}
            VITE_API_URL=/api

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:staging

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/veec-staging
            docker compose pull
            docker compose up -d
            docker image prune -f
